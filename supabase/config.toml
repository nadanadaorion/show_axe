# Local Supabase CLI configuration for Ori♡n Shows.
# Run `supabase start` (requires Docker) to bring up a local stack matching
# this file, then run migrations with `supabase db reset`.
#
# Ori♡n Shows V2 has no accounts, storage, or edge functions by design
# (see docs/17-SECURITY_AND_PRIVACY.md and docs/25-DECISION_LOG.md), so
# those subsystems are disabled here to keep local startup fast and to
# avoid implying capabilities the product does not use.
project_id = "orion-shows"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[db.seed]
# No seed data: integration tests create and clean up their own rows with
# unique ids, and the shared workspace/table set must start empty (see
# docs/05-BUSINESS_RULES.md: "The base in-line database begins empty").
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[storage]
enabled = false

[auth]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
